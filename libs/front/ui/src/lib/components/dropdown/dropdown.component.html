<div class="relative w-full my-2">
    <button #triggerBtn (click)="openDropdown()" [disabled]="disabled"
        class="border-0 border-gray-500 flex w-full bg-white/5 shadow-sm ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm/6 text-gray-200 rounded-md px-3 py-1 cursor-pointer items-center justify-between disabled:opacity-40 disabled:cursor-not-allowed"
        type="button">
        @if (selectedItem) {
            @if (selectedItem.icon) {
                <img [src]="selectedItem.icon" alt="{{ selectedItem.label }}" class="size-6 mx-1 text-primary-bourgad">
            }
            <a href="#" class="text-left block px-4 py-1 w-full sm:text-xs/6">
                {{ selectedItem.label }}
                <p class="text-gray-500 dark:text-gray-400 sm:text-xs/6 truncate pr-6">{{ selectedItem.description }}</p>
            </a>
        } @else {
            <span class="text-gray-500">{{ placeholder }}</span>
        }
        <svg class="absolute right-4 w-2.5 h-2.5 ms-3 shrink-0 transition-transform duration-150"
            [class.rotate-180]="opened"
            aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 4 4 4-4"/>
        </svg>
    </button>
</div>

<!-- Overlay pour fermer en cliquant ailleurs -->
@if (opened) {
    <div class="fixed inset-0 z-[1998]" role="button" tabindex="0"
        (click)="closeDropdown()" (keydown.escape)="closeDropdown()"></div>

    <!-- Liste en fixed -->
    <div class="fixed z-[1999] bg-gray-700 divide-y divide-gray-600 rounded-lg shadow-xl max-h-80 overflow-y-auto overflow-x-hidden"
        [style.top]="listStyle.top" [style.left]="listStyle.left" [style.width]="listStyle.width">
        <ul class="py-1 text-sm text-gray-200">
            @for (item of dropdownItems; track $index) {
                <li class="flex items-center hover:bg-gray-600 w-full px-2 cursor-pointer" (click)="selectItem(item)">
                    @if (item.icon) {
                        <img [src]="item.icon" alt="{{ item.label }}" class="size-6 mx-1">
                    }
                    <a href="#" class="block px-4 py-1 w-full sm:text-xs/6">
                        {{ item.label }}
                        <p class="text-gray-400 sm:text-xs/6 truncate pr-4">{{ item.description }}</p>
                    </a>
                </li>
            }
        </ul>
    </div>
}
