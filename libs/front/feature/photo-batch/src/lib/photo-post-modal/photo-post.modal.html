@if (visible) {
<div class="fixed inset-0 bg-black/75 backdrop-blur-sm z-modal flex items-center justify-center p-4 animate-[fadeIn_0.2s_ease]"
    (click)="onOverlayClick($event)" id="photo-post-modal-overlay">
    <div class="bg-primary-bourgad border border-white/10 rounded-2xl w-full max-w-[600px] max-h-[90vh] flex flex-col overflow-hidden animate-[slideUp_0.25s_cubic-bezier(0.16,1,0.3,1)]"
        id="photo-post-modal">

        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-5 border-b border-white/[0.08] gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-lg overflow-hidden border-2 border-primary-bourgad-2/50 shrink-0">
                    <img [src]="media?.url" [alt]="media?.title || 'Photo ancienne'"
                        class="w-full h-full object-cover [filter:sepia(0.3)]" />
                </div>
                <div>
                    <h2 class="text-lg font-bold text-white m-0">Créer un post</h2>
                    <p class="text-xs text-white/50 m-0">Ajoutez un titre, une description et localisez cette photo</p>
                </div>
            </div>
            <button
                class="bg-white/[0.05] border border-white/10 text-white/60 rounded-lg p-2 cursor-pointer transition-all flex items-center justify-center hover:bg-white/10 hover:text-white"
                (click)="close()" id="photo-post-modal-close" title="Fermer">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                </svg>
            </button>
        </div>

        <!-- Form step -->
        @if (formStep === 'form') {
        <div class="p-6 overflow-y-auto flex-1">
            <form [formGroup]="postForm" class="flex flex-col gap-5">

                <!-- Photo preview -->
                <div class="relative rounded-xl overflow-hidden h-40 bg-primary-bourgad/60">
                    <img [src]="media?.url" [alt]="media?.title || 'Photo ancienne'"
                        class="w-full h-full object-cover [filter:sepia(0.25)_contrast(1.05)]" />
                    <div
                        class="absolute bottom-2 left-2 flex items-center gap-1.5 bg-primary-bourgad-2/90 backdrop-blur-md text-white text-[0.7rem] font-semibold px-2.5 py-1 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                        </svg>
                        Photo ancienne
                    </div>
                </div>

                <!-- Title -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-[0.8rem] font-semibold text-white/70 tracking-wide" for="photo-post-title">
                        Titre <span class="text-primary-bourgad-2">*</span>
                    </label>
                    <input id="photo-post-title" type="text" formControlName="title"
                        placeholder="Ex: La place du village en 1920..."
                        class="bg-white/[0.04] border border-white/10 rounded-lg text-white px-3.5 py-2.5 text-[0.9rem] w-full transition-colors focus:outline-none focus:border-violet-500/60 focus:bg-violet-500/[0.05]" />
                </div>

                <!-- Content -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-[0.8rem] font-semibold text-white/70 tracking-wide" for="photo-post-content">
                        Description <span class="text-primary-bourgad-2">*</span>
                    </label>
                    <textarea id="photo-post-content" formControlName="content" rows="4"
                        placeholder="Décrivez ce que vous voyez sur cette photo, son histoire..."
                        class="bg-white/[0.04] border border-white/10 rounded-lg text-white px-3.5 py-2.5 text-[0.9rem] w-full transition-colors resize-y min-h-[90px] font-[inherit] focus:outline-none focus:border-violet-500/60 focus:bg-violet-500/[0.05]"></textarea>
                </div>

                <!-- Categories -->
                <div class="flex gap-4">
                    <div class="flex flex-col gap-1.5 flex-1">
                        <label class="text-[0.8rem] font-semibold text-white/70 tracking-wide">
                            Catégorie <span class="text-primary-bourgad-2">*</span>
                        </label>
                        <bgd-dropdown #category id="photo-post-category" [dropdownItems]="dropdownCategories" [name]="'category'"
                            placeholder="Choisir une catégorie" (selectedItem$)="selectCategory($event)"></bgd-dropdown>
                    </div>
                    <div class="flex flex-col gap-1.5 flex-1">
                        <label class="text-[0.8rem] font-semibold text-white/70 tracking-wide">
                            Sous-catégorie <span class="text-primary-bourgad-2">*</span>
                        </label>
                        <bgd-dropdown #subcategory id="photo-post-subcategory" [dropdownItems]="dropdownSubCategories" [name]="'subcategory'"
                            placeholder="Choisir une sous-catégorie" (selectedItem$)="selectSubCategory($event)"
                            [disabled]="!selectedCategory"></bgd-dropdown>
                    </div>
                </div>

                <!-- Location -->
                <div class="flex items-center gap-3 flex-wrap">
                    @if (location) {
                    <div
                        class="flex items-center gap-2 px-3 py-1.5 rounded-full text-[0.8rem] flex-1 bg-green-500/10 border border-green-500/30 text-green-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                        <span>{{ location.label }}</span>
                        <button class="bg-transparent border-0 text-inherit cursor-pointer opacity-70 hover:opacity-100 text-base leading-none px-0.5"
                            (click)="resetLocation()" id="reset-location-btn" type="button">×</button>
                    </div>
                    } @else {
                    <div
                        class="flex items-center gap-2 px-3 py-1.5 rounded-full text-[0.8rem] flex-1 bg-white/[0.04] border border-dashed border-white/20 text-white/40">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                        <span>Aucune localisation définie</span>
                    </div>
                    }
                    <button type="button" (click)="openLocation()" id="open-location-btn"
                        class="flex items-center gap-1.5 bg-primary-bourgad-2/10 border border-primary-bourgad-2/30 text-primary-bourgad-2 rounded-lg px-3.5 py-1.5 text-[0.8rem] font-medium cursor-pointer whitespace-nowrap transition-all hover:bg-primary-bourgad-2/20 hover:border-primary-bourgad-2/50">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                        Localiser sur la carte
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-white/[0.08] flex justify-end gap-3">
            <button type="button" (click)="close()" id="cancel-post-btn"
                class="bg-white/[0.06] border border-white/[0.12] text-white/60 rounded-lg px-5 py-2.5 text-sm font-medium cursor-pointer transition-all hover:bg-white/10 hover:text-white">
                Annuler
            </button>
            <button type="button" (click)="submit()" id="submit-post-btn" [disabled]="isLoading"
                class="flex items-center gap-1.5 bg-gradient-to-br from-violet-700 to-violet-500 text-white border-0 rounded-lg px-5 py-2.5 text-sm font-semibold cursor-pointer transition-all hover:enabled:from-violet-800 hover:enabled:to-violet-700 hover:enabled:-translate-y-px disabled:opacity-50 disabled:cursor-not-allowed">
                @if (isLoading) {
                <bgd-spinner size="sm"></bgd-spinner>
                } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
                Publier
                }
            </button>
        </div>
        }

        <!-- Location step -->
        @if (formStep === 'location') {
        <div class="flex-1 overflow-hidden">
            <bgd-localize-post #localizePost (closed$)="saveLocation($event)"></bgd-localize-post>
        </div>
        }

    </div>
</div>
}
