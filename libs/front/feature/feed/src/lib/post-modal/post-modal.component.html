<div class="fixed inset-0 z-[1000] flex items-center justify-center p-4">
  <!-- Backdrop semi-transparent pour cliquer et fermer par exemple ou juste assombrir -->
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" (click)="onClose()"></div>

  <!-- Contenu de la modale centré -->
  <div class="relative bg-white rounded-xl shadow-2xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto" *ngIf="postStore.post()">
    
    <!-- Bouton de fermeture (Croix) -->
    <button (click)="onClose()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-bourgad rounded-full p-1 bg-gray-100 hover:bg-gray-200 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>

    <!-- Affichage du post (repris depuis post.view.html en s'assurant que le style s'adapte à la popup) -->
    <article class="flex flex-col items-start justify-between w-full mt-2">
      <div class="relative mt-2 flex items-center gap-x-4 mb-4">
          <img [src]="postStore.post()?.userAvatarUrl || '/assets/village.svg'" alt="" class="size-12 rounded-full bg-gray-100 object-cover" />
          <div class="text-sm/6">
              <p class="text-lg font-semibold text-gray-900 truncate pr-6">{{postStore.post()?.title}}</p>
              <p class="text-gray-500">Par {{postStore.post()?.userFirstname}}</p>
          </div>
      </div>
      
      <div class="relative w-full mb-4" *ngIf="postStore.post()?.mediasUrls?.length">
        <img [src]="postStore.post()!.mediasUrls[0]" alt="Media du post" class="w-full rounded-xl bg-gray-100 object-cover aspect-video" />
        <div class="absolute inset-0 rounded-xl ring-1 ring-gray-900/10 ring-inset pointer-events-none"></div>
      </div>
      
      <div class="w-full text-gray-800">
        <div class="flex flex-wrap items-center gap-2 mb-3 text-xs">
          <time class="text-gray-500">{{postStore.post()?.createdAt | date:"d MMMM y 'à' H:mm"}}</time>
          <span *ngIf="postStore.post()?.subcategory?.name" 
                class="{{postStore.post()?.subcategory?.tagClass}} px-2 py-1 rounded inline-block truncate max-w-[200px]">
            {{postStore.post()?.subcategory?.name}}
          </span>
        </div>
        
        <div class="group relative mt-4">
          <p *ngIf="postStore.post()?.addressLabel" class="mb-2 text-sm/6 font-medium text-primary-bourgad flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            {{postStore.post()?.addressLabel}}
          </p>
          <p class="text-base leading-relaxed text-gray-700 whitespace-pre-wrap">{{postStore.post()?.content}}</p>
        </div>

        <div class="flex items-center text-gray-600 mt-6 pt-4 border-t border-gray-100 gap-x-4">
          <div class="flex items-center gap-x-1.5 cursor-pointer hover:text-red-500 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            <span class="font-medium">10</span>
          </div>
          <div class="flex items-center gap-x-1.5 cursor-pointer hover:text-blue-500 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-message-circle"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
            <span class="font-medium">5</span>
          </div>
        </div>
      </div>
    </article>
  </div>
</div>
