                    <img class="inline-block size-10 rounded-full mr-2 cursor-pointer"

                @else{
                <button (click)="this.router.navigate(['/login'])"
                    class="btn rounded-md py-1 px-2.5 bg-primary-bourgad text-sm/6 font-semibold text-white bg">Se
                    connecter</button>
                <button (click)="this.router.navigate(['/signup'])"
                    class="btn border-2 rounded-md py-1 px-2.5 bg-primary-bourgad text-sm/6 font-semibold text-white bg">S'inscrire</button>
                }

        <div id="map-feed" class="z-map w-full h-full">
            <bgd-map #feedMap [mapId]="this.mapId" [defaultZoom]="9" [displayScale]="false" [displayZoom]="false"
                [displayLayers]="false" [maxBounds]="this.mancheBounds" [minZoom]="8"></bgd-map>
        </div>
    </div>
    <bgd-feed-modal [map]="this.feedMap" class="z-modal-2"></bgd-feed-modal>
    <bgd-makepost class="z-modal" #makePost></bgd-makepost>
    <bgd-search-place-modal class="z-on-map-2 absolute bottom-0 left-0 w-80" [mapId]="this.mapId"
        [senseOfResults]="this.senseOfResults" [providerType]="'openStreetMap'"></bgd-search-place-modal>
    <bgd-post-modal *ngIf="feedStore.selectedPostId() !== null" [postId]="feedStore.selectedPostId()"
        (close)="feedStore.setSelectPost(null)">
    </bgd-post-modal>
</div>
